<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MA71</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #2b1b3a 0%, #1e1a2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ستاره‌ها */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background-color: #ffe0f0;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 4s infinite ease-in-out;
            box-shadow: 0 0 4px #ffb7c5;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.6);}
            50% { opacity: 1; transform: scale(1); background-color: #ffc0d0; }
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, #ffc0cb, rgba(255,192,203,0));
            border-radius: 50%;
            opacity: 0;
            animation: shoot 8s infinite linear;
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateX(-300px) translateY(300px) rotate(45deg); opacity: 0; }
        }

        /* کارت متن */
        .message-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 240, 245, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 40px 30px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,220,240,0.5);
        }
        .dynamic-text {
            font-size: 2.2rem;
            font-weight: 600;
            color: #ff6382;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
        .album-btn {
            margin-top: 35px;
            background: linear-gradient(125deg, #ffa6c9, #ff7b9c);
            border: none;
            padding: 12px 28px;
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }
        .album-btn.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* آلبوم overlay */
        .album-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 30, 55, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }
        .album-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        /* جلد بسته (کتاب) */
        .closed-book {
            background: linear-gradient(145deg, #f3e0c0, #d6b07a);
            width: 300px;
            height: 360px;
            border-radius: 12px 20px 20px 12px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.4), inset -2px -1px 4px rgba(0,0,0,0.1), inset 1px 1px 5px rgba(255,255,200,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            text-align: center;
            border-left: 8px solid #aa7b4c;
            position: relative;
        }
        .closed-book:hover {
            transform: scale(1.02);
        }
        .closed-book .book-icon {
            font-size: 4.5rem;
        }
        .closed-book p {
            margin-top: 15px;
            color: #4c2f1d;
            font-size: 1.4rem;
            font-weight: bold;
            background: rgba(255,240,210,0.7);
            padding: 6px 20px;
            border-radius: 40px;
        }

        /* کتاب باز */
        .opened-book {
            background: transparent;
            width: 90%;
            max-width: 850px;
            perspective: 1600px;
            transform-style: preserve-3d;
            display: none;
        }
        .opened-book.active {
            display: block;
            animation: bookOpenAnim 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes bookOpenAnim {
            0% { transform: scale(0.7) rotateY(-30deg); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        .book {
            width: 100%;
            background: #fef2e0;
            border-radius: 16px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,245,215,0.8);
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .page-left, .page-right {
            flex: 1;
            min-width: 250px;
            background: #fffaf2;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.2s;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        .page-left {
            border-right: 1px solid #e6cfae;
            border-radius: 16px 0 0 16px;
        }
        .page-right {
            border-radius: 0 16px 16px 0;
        }
        .page-left img, .page-right img {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 12px 22px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid #ffe3c6;
        }
        .page-left img:active, .page-right img:active {
            transform: scale(0.97);
        }
        .page-left p, .page-right p {
            margin-top: 14px;
            color: #aa7a5c;
            font-weight: 500;
            background: rgba(245,225,200,0.6);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .hint {
            margin-top: 20px;
            color: #f5ccaa;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* انیمیشن ورق زدن */
        .flip-left {
            animation: flipLeft 0.5s ease-in-out forwards;
        }
        .flip-right {
            animation: flipRight 0.5s ease-in-out forwards;
        }
        @keyframes flipLeft {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(-70deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); }
        }
        @keyframes flipRight {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(70deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); }
        }

        /* بسته شدن کتاب */
        .book-close {
            animation: bookCloseAnim 0.4s ease-in forwards;
        }
        @keyframes bookCloseAnim {
            0% { transform: scale(1) rotateY(0deg); opacity: 1; }
            100% { transform: scale(0.7) rotateY(30deg); opacity: 0; }
        }

        @media (max-width: 650px) {
            .dynamic-text { font-size: 1.5rem; }
            .closed-book { width: 240px; height: 280px; }
            .page-left img, .page-right img { max-width: 180px; }
            .book { flex-direction: column; }
            .page-left, .page-right { border-right: none; border-bottom: 1px solid #e6cfae; }
        }
    </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="message-card">
    <div class="dynamic-text" id="loveText"></div>
    <div class="album-btn" id="albumBtn">📖✨ آلبوم خاطرات ✨📖</div>
</div>

<!-- آلبوم -->
<div class="album-overlay" id="albumOverlay">
    <!-- جلد بسته -->
    <div class="closed-book" id="closedBook">
        <div class="book-icon">📘💝</div>
        <p>کتاب خاطرات</p>
        <p style="font-size:0.8rem;">✨ بزن بازش کن ✨</p>
    </div>
    <!-- کتاب باز -->
    <div class="opened-book" id="openedBook">
        <div class="book" id="book">
            <div class="page-left" id="pageLeft">
                <img id="leftImg" src="https://images.pexels.com/photos/4588065/pexels-photo-4588065.jpeg?auto=compress&cs=tinysrgb&w=400" alt="عکس چپ">
                
            </div>
            <div class="page-right" id="pageRight">
                <img id="rightImg" src="https://images.pexels.com/photos/2558605/pexels-photo-2558605.jpeg?auto=compress&cs=tinysrgb&w=400" alt="عکس راست">
                
            </div>
        </div>
        <div class="hint">💕 روی عکس ها بزن 💕</div>
    </div>
</div>

<script>
    // ستاره‌سازی
    function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 260; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 4 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 5 + 2) + 's';
            star.style.animationDelay = (Math.random() * 6) + 's';
            container.appendChild(star);
        }
        for (let i = 0; i < 6; i++) {
            const meteor = document.createElement('div');
            meteor.classList.add('shooting-star');
            meteor.style.top = Math.random() * 60 + '%';
            meteor.style.left = Math.random() * 80 + '%';
            meteor.style.animationDelay = (Math.random() * 12) + 's';
            meteor.style.animationDuration = (Math.random() * 5 + 5) + 's';
            container.appendChild(meteor);
        }
    }
    createStars();

    // متن تکه تکه
    const sequence = [
        { text: "MA71", delay: 0 },
        { text: "I love", delay: 1100 },
        { text: "I love only", delay: 2000 },
        { text: "I love only one", delay: 3300 },
        { text: "I love only one person.", delay: 4800 },
        { text: "I love only one person. It's", delay: 6500 },
        { text: "I love only one person. It's you. 💖", delay: 8300 }
    ];
    const loveTextEl = document.getElementById('loveText');
    let activeTimeouts = [];
    function clearAllTimeouts() { for (let t of activeTimeouts) clearTimeout(t); activeTimeouts = []; }
    function startTypingEffect() {
        clearAllTimeouts();
        loveTextEl.textContent = '';
        sequence.forEach((item) => {
            const tid = setTimeout(() => { loveTextEl.textContent = item.text; }, item.delay);
            activeTimeouts.push(tid);
        });
        const lastDelay = sequence[sequence.length-1].delay;
        const tid2 = setTimeout(() => { document.getElementById('albumBtn').classList.add('show'); }, lastDelay + 500);
        activeTimeouts.push(tid2);
    }
    startTypingEffect();

    // ---------- مدیریت آلبوم ----------
    const overlay = document.getElementById('albumOverlay');
    const closedBook = document.getElementById('closedBook');
    const openedBook = document.getElementById('openedBook');
    const albumBtn = document.getElementById('albumBtn');
    const leftImg = document.getElementById('leftImg');
    const rightImg = document.getElementById('rightImg');
    const pageLeft = document.getElementById('pageLeft');
    const pageRight = document.getElementById('pageRight');

    // عکس‌ها
    const page1LeftSrc = "2.WEBP";
    const page1RightSrc = "1.WEBP";
    const page2LeftSrc = "3.jpg";
    const page2RightSrc = "5.jpg";

    let currentPage = 1; // 1 or 2

    function updateContent() {
        if (currentPage === 1) {
            leftImg.src = page1LeftSrc;
            rightImg.src = page1RightSrc;
            
        } else {
            leftImg.src = page2LeftSrc;
            rightImg.src = page2RightSrc;
            
        }
    }

    // باز کردن جلد (نمایش کتاب بسته)
    function showClosedBook() {
        overlay.classList.add('active');
        closedBook.style.display = 'flex';
        openedBook.classList.remove('active');
        currentPage = 1;
        updateContent();
    }

    // باز کردن کتاب (وقتی روی جلد کلیک شد)
    function openBook() {
        closedBook.style.display = 'none';
        openedBook.classList.add('active');
        // ریست انیمیشن ورق‌ها
    }

    // بستن کتاب با انیمیشن
    function closeBook() {
        openedBook.classList.add('book-close');
        setTimeout(() => {
            overlay.classList.remove('active');
            openedBook.classList.remove('active', 'book-close');
            closedBook.style.display = 'flex';
            currentPage = 1;
            updateContent();
            openedBook.style.animation = 'none';
            openedBook.offsetHeight;
            openedBook.style.animation = null;
        }, 400);
    }

    // ورق زدن به صفحه بعد (از 1 به 2)
    function flipToNext() {
        if (currentPage !== 1) return;
        pageLeft.classList.add('flip-left');
        setTimeout(() => {
            pageLeft.classList.remove('flip-left');
            currentPage = 2;
            updateContent();
        }, 500);
    }

    // ورق زدن به صفحه قبل (از 2 به 1)
    function flipToPrev() {
        if (currentPage !== 2) return;
        pageRight.classList.add('flip-right');
        setTimeout(() => {
            pageRight.classList.remove('flip-right');
            currentPage = 1;
            updateContent();
        }, 500);
    }

    // رویدادها
    albumBtn.addEventListener('click', showClosedBook);
    closedBook.addEventListener('click', openBook);

    // کلیک روی تصاویر
    pageLeft.addEventListener('click', (e) => {
        if (e.target.closest('img')) {
            if (currentPage === 1) flipToNext();
            else {
                e.target.style.transform = 'scale(0.95)';
                setTimeout(() => { if(e.target) e.target.style.transform = ''; }, 150);
            }
        }
    });

    pageRight.addEventListener('click', (e) => {
        if (e.target.closest('img')) {
            if (currentPage === 1) closeBook();
            else if (currentPage === 2) flipToPrev();
        }
    });

    // بستن با کلیک روی پس‌زمینه
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeBook();
    });

    updateContent();
</script>
</body>
</html>
