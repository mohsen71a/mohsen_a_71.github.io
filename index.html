<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff7b9c">
    <title>MA71</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #2b1b3a 0%, #1e1a2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ---------- ستاره‌ها ---------- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background-color: #ffe0f0;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 4s infinite ease-in-out;
            box-shadow: 0 0 4px #ffb7c5;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.6);}
            50% { opacity: 1; transform: scale(1); background-color: #ffc0d0; }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, #ffc0cb, rgba(255,192,203,0));
            border-radius: 50%;
            opacity: 0;
            animation: shoot 8s infinite linear;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateX(-300px) translateY(300px) rotate(45deg); opacity: 0; }
        }

        /* کارت متن */
        .message-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 240, 245, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 30px 20px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,220,240,0.5);
        }

        .dynamic-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ff6382;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.2);
            line-height: 1.4;
        }

        /* دکمه آلبوم */
        .album-btn {
            margin-top: 30px;
            background: linear-gradient(125deg, #ffa6c9, #ff7b9c);
            border: none;
            padding: 10px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .album-btn.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* ---------- آلبوم (کتاب) ---------- */
        .album-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 30, 55, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }

        .album-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        /* جلد بسته (کتاب) */
        .closed-album {
            background: linear-gradient(145deg, #f3e0c0, #d6b07a);
            width: 260px;
            height: 320px;
            border-radius: 12px 20px 20px 12px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.4), inset -2px -1px 4px rgba(0,0,0,0.1), inset 1px 1px 5px rgba(255,255,200,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            text-align: center;
            border-left: 8px solid #aa7b4c;
            position: relative;
        }
        .closed-album:hover {
            transform: scale(1.02);
        }
        .closed-album .album-icon {
            font-size: 4rem;
        }
        .closed-album p {
            margin-top: 12px;
            color: #4c2f1d;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(255,240,210,0.7);
            padding: 4px 16px;
            border-radius: 40px;
        }

        /* کتاب باز */
        .opened-album {
            background: transparent;
            width: 95%;
            max-width: 750px;
            perspective: 1600px;
            transform-style: preserve-3d;
            display: none;
            opacity: 0;
            transition: all 0.4s;
        }
        .opened-album.active {
            display: block;
            opacity: 1;
            animation: bookOpenAnim 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes bookOpenAnim {
            0% { transform: scale(0.7) rotateY(-30deg); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        .book {
            width: 100%;
            background: #fef2e0;
            border-radius: 16px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,245,215,0.8);
            display: flex;
            flex-direction: row; /* همیشه کنار هم */
            overflow: hidden;
            position: relative;
        }

        /* صفحات کتاب - همیشه کنار هم */
        .page-left, .page-right {
            flex: 1;
            background: #fffaf2;
            padding: 15px 10px;
            text-align: center;
            transition: all 0.2s;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        .page-left {
            border-right: 1px solid #e6cfae;
        }
        .page-right {
            border-left: 1px solid #e6cfae;
        }

        .page-left img, .page-right img {
            width: 100%;
            max-width: 220px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid #ffe3c6;
        }
        .page-left img:active, .page-right img:active {
            transform: scale(0.97);
        }
        .page-left p, .page-right p {
            margin-top: 10px;
            color: #aa7a5c;
            font-weight: 500;
            background: rgba(245,225,200,0.6);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .hint {
            margin-top: 16px;
            color: #f5ccaa;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* انیمیشن ورق زدن واقعی */
        .flip-page-left {
            animation: flipLeftPage 0.5s ease-in-out forwards;
        }
        .flip-page-right {
            animation: flipRightPage 0.5s ease-in-out forwards;
        }
        @keyframes flipLeftPage {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(-70deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); }
        }
        @keyframes flipRightPage {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(70deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); }
        }

        .book-close {
            animation: bookCloseAnim 0.4s ease-in forwards;
        }
        @keyframes bookCloseAnim {
            0% { transform: scale(1) rotateY(0deg); opacity: 1; }
            100% { transform: scale(0.7) rotateY(30deg); opacity: 0; }
        }

        /* موبایل: صفحات کنار هم بمانند، فقط سایزها کوچک‌تر شوند */
        @media (max-width: 650px) {
            .dynamic-text {
                font-size: 1.4rem;
            }
            .closed-album {
                width: 200px;
                height: 260px;
            }
            .closed-album .album-icon {
                font-size: 3rem;
            }
            .closed-album p {
                font-size: 1rem;
            }
            .book {
                flex-direction: row !important; /* مهم: همواره کنار هم */
            }
            .page-left, .page-right {
                padding: 10px 6px;
            }
            .page-left img, .page-right img {
                max-width: 140px;
            }
            .page-left p, .page-right p {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
            .hint {
                font-size: 0.7rem;
            }
            .album-btn {
                font-size: 1rem;
                padding: 8px 18px;
            }
        }
    </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="message-card">
    <div class="dynamic-text" id="loveText"></div>
    <div class="album-btn" id="albumBtn">📖✨ آلبوم خاطرات ✨📖</div>
</div>

<!-- آلبوم -->
<div class="album-overlay" id="albumOverlay">
    <div class="closed-album" id="closedAlbum">
        <div class="album-icon">📘💝</div>
        <p>کتاب خاطرات</p>
        <p style="font-size:0.7rem;">✨ بزن بازش کن ✨</p>
    </div>
    <div class="opened-album" id="openedAlbum">
        <div class="book" id="book">
            <div class="page-left" id="pageLeft">
                <img id="leftImg" src="https://images.pexels.com/photos/4588065/pexels-photo-4588065.jpeg?auto=compress&cs=tinysrgb&w=400" alt="عکس">
                
            </div>
            <div class="page-right" id="pageRight">
                <img id="rightImg" src="https://images.pexels.com/photos/2558605/pexels-photo-2558605.jpeg?auto=compress&cs=tinysrgb&w=400" alt="عکس">
                
            </div>
        </div>
        <div class="hint">💕بزن روی عکسا💕</div>
    </div>
</div>

<script>
    // ستاره‌سازی
    function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 5 + 2) + 's';
            star.style.animationDelay = (Math.random() * 6) + 's';
            container.appendChild(star);
        }
        for (let i = 0; i < 5; i++) {
            const meteor = document.createElement('div');
            meteor.classList.add('shooting-star');
            meteor.style.top = Math.random() * 60 + '%';
            meteor.style.left = Math.random() * 80 + '%';
            meteor.style.animationDelay = (Math.random() * 12) + 's';
            meteor.style.animationDuration = (Math.random() * 5 + 5) + 's';
            container.appendChild(meteor);
        }
    }
    createStars();

    // متن تکه تکه
    const sequence = [
        { text: "MA71", delay: 0 },
        { text: "I love", delay: 1100 },
        { text: "I love only", delay: 2200 },
        { text: "I love only one", delay: 3300 },
        { text: "I love only one person,", delay: 4800 },
        { text: "I love only one person, It's", delay: 6500 },
        { text: "I love only one person, It's you 💖", delay: 8300 }
    ];
    const loveTextEl = document.getElementById('loveText');
    let activeTimeouts = [];
    function clearAllTimeouts() { for (let t of activeTimeouts) clearTimeout(t); activeTimeouts = []; }
    function startTypingEffect() {
        clearAllTimeouts();
        loveTextEl.textContent = '';
        sequence.forEach((item) => {
            const tid = setTimeout(() => { loveTextEl.textContent = item.text; }, item.delay);
            activeTimeouts.push(tid);
        });
        const lastDelay = sequence[sequence.length-1].delay;
        const tid2 = setTimeout(() => { document.getElementById('albumBtn').classList.add('show'); }, lastDelay + 500);
        activeTimeouts.push(tid2);
    }
    startTypingEffect();

    // ---------- مدیریت آلبوم ----------
    const overlay = document.getElementById('albumOverlay');
    const closedAlbumDiv = document.getElementById('closedAlbum');
    const openedAlbumDiv = document.getElementById('openedAlbum');
    const albumBtn = document.getElementById('albumBtn');
    const leftImg = document.getElementById('leftImg');
    const rightImg = document.getElementById('rightImg');
    const pageLeftDiv = document.getElementById('pageLeft');
    const pageRightDiv = document.getElementById('pageRight');

    // عکس‌های صفحات
    const page1LeftSrc = "assets/1.WEBP";
    const page1RightSrc = "assets/2.WEBP";
    const page2LeftSrc = "assets/5.jpg";
    const page2RightSrc = "assets/3.jpg";

    let currentPage = 1;

    function updateContent() {
        if (currentPage === 1) {
            leftImg.src = page1LeftSrc;
            rightImg.src = page1RightSrc;
           
        } else {
            leftImg.src = page2LeftSrc;
            rightImg.src = page2RightSrc;
            
        }
    }

    function flipToNext() {
        if (currentPage !== 1) return;
        pageLeftDiv.classList.add('flip-page-left');
        setTimeout(() => {
            pageLeftDiv.classList.remove('flip-page-left');
            currentPage = 2;
            updateContent();
        }, 500);
    }

    function flipToPrev() {
        if (currentPage !== 2) return;
        pageRightDiv.classList.add('flip-page-right');
        setTimeout(() => {
            pageRightDiv.classList.remove('flip-page-right');
            currentPage = 1;
            updateContent();
        }, 500);
    }

    function closeAlbumWithAnim() {
        openedAlbumDiv.classList.add('book-close');
        setTimeout(() => {
            overlay.classList.remove('active');
            openedAlbumDiv.classList.remove('active', 'book-close');
            closedAlbumDiv.style.display = 'flex';
            currentPage = 1;
            updateContent();
            openedAlbumDiv.style.animation = 'none';
            openedAlbumDiv.offsetHeight;
            openedAlbumDiv.style.animation = null;
        }, 400);
    }

    function openAlbum() {
        overlay.classList.add('active');
        closedAlbumDiv.style.display = 'flex';
        openedAlbumDiv.classList.remove('active');
        setTimeout(() => {
            closedAlbumDiv.style.display = 'none';
            openedAlbumDiv.classList.add('active');
            currentPage = 1;
            updateContent();
        }, 50);
    }

    albumBtn.addEventListener('click', openAlbum);
    closedAlbumDiv.addEventListener('click', () => {
        closedAlbumDiv.style.display = 'none';
        openedAlbumDiv.classList.add('active');
        currentPage = 1;
        updateContent();
    });

    pageLeftDiv.addEventListener('click', (e) => {
        if (e.target.closest('img')) {
            if (currentPage === 1) flipToNext();
            else {
                e.target.style.transform = 'scale(0.95)';
                setTimeout(() => { if(e.target) e.target.style.transform = ''; }, 150);
            }
        }
    });

    pageRightDiv.addEventListener('click', (e) => {
        if (e.target.closest('img')) {
            if (currentPage === 1) closeAlbumWithAnim();
            else if (currentPage === 2) flipToPrev();
        }
    });

    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeAlbumWithAnim();
    });

    updateContent();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.error('SW registration failed', err));
  }
</script>
</body>
</html>
